services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: snug
      POSTGRES_PASSWORD: snug
      POSTGRES_DB: snug_ledger
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snug -d snug_ledger"]
      interval: 2s
      timeout: 3s
      retries: 30

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql://snug:snug@db:5432/snug_ledger
      ADMIN_TOKEN: 'dev-admin-token'
    ports:
      - '8000:8000'
    depends_on:
     db:
        condition: service_healthy
    command: ['uvicorn', 'main:app', '--host', '0.0.0.0', '--port', '8000', '--log-level', 'debug', '--access-log']

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_DATABASE_CONNECTED: "true"
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  db_data: